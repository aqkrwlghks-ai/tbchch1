<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주보 · 빛나는교회</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%230f3b64%22/><text x=%2250%22 y=%2268%22 font-size=%2255%22 text-anchor=%22middle%22 fill=%22white%22>%E2%9C%A6</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="headerHost"></div>

<section class="page-hero">
  <span class="page-badge">CHURCH NEWS</span>
  <h1>주보</h1>
  <p>매주 주보를 안내합니다.</p>
  <div class="bar"></div>
</section>

<div class="page-body">
  <ul class="notice-list" id="bulletin-list-page"></ul>
</div>

<div id="footerHost"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/supabase-config.js"></script>
<script src="/member-auth.js"></script>
<script src="/common.js"></script>
<script>
document.addEventListener('bulletinsdata:loaded', (e) => {
  const list = document.getElementById('bulletin-list-page');
  if (!e.detail || e.detail.length === 0) {
    list.innerHTML = '<li class="gallery-empty">아직 등록된 주보가 없습니다.</li>';
    return;
  }
  list.innerHTML = '';
  e.detail.slice().sort((a,b) => (a.date < b.date ? 1 : -1)).forEach(b => {
    const li = document.createElement('li');
    li.innerHTML = `<span class="notice-date">${b.date}</span><span class="notice-title"><a href="${b.file}" target="_blank" rel="noopener" style="color:inherit;">📄 ${b.title}</a></span>`;
    list.appendChild(li);
  });
});
</script>
</body>
</html>
