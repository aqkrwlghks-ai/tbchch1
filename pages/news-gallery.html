<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>갤러리(교회활동) · 빛나는교회</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%230f3b64%22/><text x=%2250%22 y=%2268%22 font-size=%2255%22 text-anchor=%22middle%22 fill=%22white%22>%E2%9C%A6</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="headerHost"></div>

<section class="page-hero">
  <span class="page-badge">CHURCH NEWS</span>
  <h1>갤러리(교회활동)</h1>
  <p>빛나는교회 활동 사진·자료입니다.</p>
  <div class="bar"></div>
</section>

<div class="page-body" style="max-width:900px;">
  <div class="gallery-cat-grid" id="gallery-cat-grid-page"></div>
</div>

<div class="photo-lightbox" id="photoLightbox" hidden>
  <div class="lightbox-header">
    <div>
      <p class="lightbox-title" id="lightboxTitle"></p>
      <p class="lightbox-sub" id="lightboxSub"></p>
    </div>
    <button class="lightbox-close" id="lightboxClose" aria-label="닫기">✕</button>
  </div>
  <div class="lightbox-body">
    <div class="lightbox-grid" id="lightboxGrid"></div>
  </div>
</div>

<div id="footerHost"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/supabase-config.js"></script>
<script src="/member-auth.js"></script>
<script src="/common.js"></script>
<script>
function formatDate(iso) { return iso ? iso.slice(0, 10) : ''; }
fetch('/.netlify/functions/drive-photos')
  .then(res => res.json())
  .then(data => {
    const catGridEl = document.getElementById('gallery-cat-grid-page');
    const categories = data.categories || [];
    if (data.error || categories.length === 0) {
      catGridEl.innerHTML = '<p class="gallery-empty">아직 사진이 없거나 불러오지 못했습니다.</p>';
      return;
    }

    catGridEl.innerHTML = categories.map((cat, i) => `
      <button type="button" class="gallery-cat-card" data-cat-index="${i}">
        <div class="gallery-cat-thumb">
          ${cat.thumb
            ? `<img src="${cat.thumb}" alt="${cat.name}" loading="lazy">`
            : `<div class="gallery-cat-thumb-empty">사진 없음</div>`}
          <span class="gallery-cat-count">${cat.count}개</span>
        </div>
        <div>
          <p class="gallery-cat-label">카테고리</p>
          <p class="gallery-cat-name">${cat.name}</p>
          <p class="gallery-cat-date">${cat.date ? formatDate(cat.date) + ' 업데이트' : '최근 업데이트 없음'}</p>
        </div>
      </button>`).join('');

    catGridEl.querySelectorAll('[data-cat-index]').forEach(btn => {
      const cat = categories[Number(btn.dataset.catIndex)];
      btn.addEventListener('click', () => openCategoryLightbox(cat.id, cat.name));
    });
  })
  .catch(() => {
    document.getElementById('gallery-cat-grid-page').innerHTML = '<p class="gallery-empty">아직 사진이 없거나 불러오지 못했습니다.</p>';
  });
</script>
</body>
</html>
