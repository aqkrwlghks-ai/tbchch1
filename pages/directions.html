<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>찾아오시는길 · 빛나는교회</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%230f3b64%22/><text x=%2250%22 y=%2268%22 font-size=%2255%22 text-anchor=%22middle%22 fill=%22white%22>%E2%9C%A6</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="headerHost"></div>

<section class="page-hero">
  <span class="page-badge">FIND US</span>
  <h1>찾아오시는길</h1>
  <p>빛나는교회 오시는 길을 안내합니다.</p>
  <div class="bar"></div>
</section>

<div class="page-body">
  <div class="visit-info">
    <p><strong>주소</strong> <span data-bind="contact.address"></span></p>
    <p><strong>전화</strong> <span data-bind="contact.phone"></span></p>
    <p><strong>팩스</strong> <span data-bind="contact.fax"></span></p>
    <p><strong>버스</strong> <span data-bind="contact.bus"></span></p>
  </div>
  <div id="kakaoMap" style="width:100%;height:400px;border-radius:16px;margin-top:24px;background:#f2f2f2;"></div>
</div>

<div id="footerHost"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/supabase-config.js"></script>
<script src="/member-auth.js"></script>
<script src="/common.js"></script>
<script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=a271f7134507da868b7419c80ba23ec8&libraries=services"></script>
<script>
document.addEventListener('sitedata:loaded', function (e) {
  var address = e.detail && e.detail.contact && e.detail.contact.address;
  if (!address || !window.kakao || !window.kakao.maps) return;

  kakao.maps.load(function () {
    var geocoder = new kakao.maps.services.Geocoder();
    geocoder.addressSearch(address, function (result, status) {
      var container = document.getElementById('kakaoMap');
      if (status !== kakao.maps.services.Status.OK || !result[0]) {
        container.innerHTML = '<p style="padding:16px;color:var(--text-gray);">지도를 불러오지 못했습니다.</p>';
        return;
      }
      var coords = new kakao.maps.LatLng(result[0].y, result[0].x);
      var map = new kakao.maps.Map(container, { center: coords, level: 3 });
      new kakao.maps.Marker({ position: coords, map: map });
      map.setDraggable(true);
      map.setZoomable(true);
    });
  });
});
</script>
</body>
</html>
