<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>중보기도요청 · 빛나는교회</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%230f3b64%22/><text x=%2250%22 y=%2268%22 font-size=%2255%22 text-anchor=%22middle%22 fill=%22white%22>%E2%9C%A6</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="headerHost"></div>

<section class="page-hero">
  <span class="page-badge">COMMUNITY &amp; 양육</span>
  <h1>🙏 중보기도요청</h1>
  <p>성도님이 나눠주신 기도 제목입니다.</p>
  <div class="bar"></div>
</section>

<div class="page-body" style="max-width:700px;">
  <div id="readGuard" class="admin-guard" hidden>
    <p>로그인한 성도님만 볼 수 있는 기도요청입니다.</p>
    <p style="margin-top:8px;"><a href="/pages/login.html">로그인</a> 또는 <a href="/pages/signup.html">회원가입</a> 후 다시 열어주세요.</p>
  </div>
  <div class="community-post-detail" id="postDetailWrap" hidden>
    <h2 id="postTitle" class="sermon-view-title"></h2>
    <p class="community-post-meta" id="postMeta"></p>
    <div class="sermon-view-body" id="postBody"></div>
    <div class="sermon-form-actions" style="margin-top:24px;">
      <a href="/pages/prayer-request.html" class="btn btn-ghost">목록으로</a>
      <button type="button" class="btn btn-ghost" id="postDeleteBtn" hidden>삭제</button>
    </div>
  </div>
</div>

<div id="footerHost"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/supabase-config.js"></script>
<script src="/member-auth.js"></script>
<script src="/community-data.js"></script>
<script src="/common.js"></script>
<script>
function esc(s) { return (s || '').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

const params = new URLSearchParams(location.search);
const idParam = params.get('id') || '';

(async function () {
  const profile = await getCurrentProfile();
  if (!profile) {
    document.getElementById('readGuard').hidden = false;
    return;
  }
  document.getElementById('postDetailWrap').hidden = false;

  try {
    const post = await fetchCommunityPostById(idParam);
    document.getElementById('postTitle').textContent = post.title || '';
    document.getElementById('postMeta').textContent = `${post.author_name} · ${(post.created_at || '').slice(0, 10)}`;
    document.getElementById('postBody').innerHTML = esc(post.body).replace(/\n/g, '<br>');

    if (profile.id === post.author_id || profile.is_admin) {
      const delBtn = document.getElementById('postDeleteBtn');
      delBtn.hidden = false;
      delBtn.addEventListener('click', async () => {
        if (!confirm('이 기도요청을 삭제할까요?')) return;
        try {
          await deleteCommunityPost(post.id);
          location.href = '/pages/prayer-request.html';
        } catch (err) {
          alert('삭제 중 오류가 발생했습니다: ' + err.message);
        }
      });
    }
  } catch (err) {
    document.getElementById('postTitle').textContent = '글을 찾을 수 없습니다.';
  }
})();
</script>
</body>
</html>
